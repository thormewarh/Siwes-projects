<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Mock User Data</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            background: white;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Fetch Mock User Data</h1>
    <p>Click the button below to fetch user data from the API.</p>

    <button onclick="fetchUsers()">Fetch Users</button>

    <div id="output"></div>

    <script>
        async function fetchUsers() {
            const output = document.getElementById("output");

            try {
                // API URL
                const response = await fetch("https://jsonplaceholder.typicode.com/users");

                // Check if the request was successful
                if (!response.ok) {
                    throw new Error("Failed to fetch data.");
                }

                // Convert response to JSON
                const users = await response.json();

                // Extract only name, email, and company.name
                const extractedUsers = users.map(({ name, email, company }) => ({
                    name,
                    email,
                    companyName: company.name
                }));

                // Display the data on the page
                output.textContent = JSON.stringify(extractedUsers, null, 2);

                // Also log it to the console
                console.log(extractedUsers);

            } catch (error) {
                console.error("Custom Error: Unable to fetch user data. Please check the API URL.");

                output.textContent =
                    "Custom Error: Unable to fetch user data. Please check the API URL.";
            }
        }
    </script>

</body>
</html>
